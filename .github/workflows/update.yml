name: Update Market Data

on:
  schedule:
    # Saturday 5:00 AM Singapore time
    - cron: "0 21 * * 5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prism/requirements.txt

      - name: Run main market data collector
        run: |
          python prism/src/data_collector.py

      - name: Run technical collector
        run: |
          python prism/src/collectors/technical_collector.py

      - name: Run macro collector
        run: |
          python prism/src/collectors/macro_collector.py

      - name: Run almanac collector
        run: |
          python prism/src/collectors/almanac_collector.py

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prism/data
          git diff --cached --quiet || git commit -m "chore: update Prism agent data $(date +'%Y-%m-%d')"
          git push