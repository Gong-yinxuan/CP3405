name: Update Market Data

on:
  schedule:
    # Saturday 6:00 AM Singapore time
    - cron: "0 22 * * 5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prism/requirements.txt

      - name: Run main market data collector
        run: |
          python prism/src/data_collector.py

      - name: Run technical collector
        run: |
          python prism/src/collectors/technical_collector.py

      - name: Run macro collector
        run: |
          python prism/src/collectors/macro_collector.py

      - name: Run almanac collector
        run: |
          python prism/src/collectors/almanac_collector.py

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add prism/data

          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
          else
            git commit -m "chore: update Prism agent data $(date +'%Y-%m-%d')"
          fi

          git pull --rebase origin main
          git push origin main