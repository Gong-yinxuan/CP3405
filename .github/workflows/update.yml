name: Update Market Data

on:
  schedule:
    # Monday 8:00 AM Singapore time
    # Runs R3/R4/R5 agent collectors + chart builder + report builders
    - cron: "0 0 * * 1"

    # Saturday 6:00 AM Singapore time
    # Runs R6 actuals collector after US Friday close
    - cron: "0 22 * * 5"

    # 1st of each month, 8:00 AM Singapore time
    # Refreshes long-run monthly seasonality stats (slow-changing, no need weekly)
    - cron: "0 0 1 * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prism/requirements.txt

      # -----------------------------
      # R6 ACTUALS COLLECTOR
      # Runs Saturday 6:00 AM SGT
      # -----------------------------

      - name: Run R6 actuals collector
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * 5'
        run: |
          python prism/src/data_collector.py

      - name: Run R6/R10 calibration runner
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * 5'
        run: |
          python prism/src/calibration_runner.py

      # -----------------------------
      # MONTHLY SEASONALITY COLLECTOR
      # Runs 1st of each month -- slow-changing historical stats
      # -----------------------------

      - name: Run monthly seasonality collector
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 1 * *'
        run: |
          python prism/src/collectors/seasonality_collector.py

      # -----------------------------
      # R3/R4/R5 AGENT COLLECTORS
      # Runs Monday 8:00 AM SGT
      # -----------------------------

      - name: Run technical collector
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/collectors/technical_collector.py

      - name: Run macro collector
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/collectors/macro_collector.py

      - name: Run almanac collector
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/collectors/almanac_collector.py

      - name: Build agent charts
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/chart_builder.py

      # -----------------------------
      # REPORT BUILDERS
      # Auto-fill Week{N}/R{3,4,5}_.../*_agent_W{NN}.md from each
      # collector's JSON output. Week number is computed ONCE here and
      # passed explicitly to all three, so they can't drift onto
      # different week numbers (each script's own auto-detect only looks
      # at whichever Week{N} folders already exist, so running them
      # back-to-back would otherwise bump the number each time).
      # -----------------------------

      - name: Determine week number
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        id: week
        run: |
          WEEK_NUMBER=$(python -c "import sys; sys.path.insert(0, 'prism/src/report_builders'); from pathlib import Path; from week_utils import detect_next_week_number; print(detect_next_week_number(Path('.')))")
          echo "number=$WEEK_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Detected week number: $WEEK_NUMBER"

      - name: Build almanac agent report (R3)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/report_builders/generate_almanac.py \
            prism/data/almanac/almanac_collector_output.json \
            ${{ steps.week.outputs.number }} \
            --out-root . \
            --seasonality-json prism/data/almanac/monthly_seasonality.json \
            --charts-dir prism/data/almanac/charts

      - name: Build macro agent report (R4)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/report_builders/generate_macro.py \
            prism/data/macro/macro_collector_output.json \
            ${{ steps.week.outputs.number }} \
            --out-root . \
            --charts-dir prism/data/macro/charts

      - name: Build technical agent report (R5)
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 1'
        run: |
          python prism/src/report_builders/generate_technical.py \
            prism/data/technical/technical_collector_output.json \
            ${{ steps.week.outputs.number }} \
            --out-root . \
            --charts-dir prism/data/technical/charts

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Git status before staging:"
          git status --short

          git add -A prism/data
          git add -A Week* || true
          git add -A delta_*.md || true

          echo "Git status after staging:"
          git status --short

          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
          else
            git commit -m "chore: update Prism data $(date +'%Y-%m-%d')"
          fi

          echo "Git status after commit:"
          git status --short

          git pull --rebase --autostash origin main
          git push origin main