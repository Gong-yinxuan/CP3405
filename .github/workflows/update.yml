name: Update Market Data

on:
  schedule:
    # Runs every Monday at 10:00 UTC
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prism/requirements.txt

      - name: Run data pipeline
        run: |
          python prism/src/data_collector.py

      - name: Commit and push output.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prism/data/output.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date +'%Y-%m-%d')"
          git push